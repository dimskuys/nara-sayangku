<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Sayangku 🤍</title>

<!-- ====================================================================
     CARA EDIT (bisa langsung lewat GitHub, tanpa install apa-apa):
     1. Buka repo kamu di github.com, klik file ini (index.html), klik ikon
        pensil (Edit) di kanan atas.
     2. Cari bagian "DATA HALAMAN BUKU" di bawah (di dalam <script>).
        Ganti tulisan di dalam tanda kutip sesuka kamu.
     3. Untuk foto: buat folder bernama "images" di repo, upload foto ke
        situ (misal foto1.jpg, foto2.jpg, dst), lalu tulis nama filenya
        di bagian "photo:" masing-masing halaman. Kalau foto belum ada,
        halaman otomatis nunjukin kotak placeholder — jadi web tetap
        jalan normal.
     4. Klik "Commit changes" di bawah, tunggu sebentar, refresh websitenya.
     ==================================================================== -->

<style>
  :root{
    --wine: #5c1f2e;
    --wine-dark: #3d1420;
    --gold: #c9a24b;
    --blush: #f3ded9;
    --cream: #fbf3e7;
    --ink: #3a2b28;
    --sage: #7c8b5d;
    --open-scale: 1; /* Default scale untuk desktop */
  }

  @media (max-width: 850px) {
    :root { --open-scale: 0.65; } /* Buku mengecil saat terbuka di layar HP agar muat 2 halaman */
  }

  *{ box-sizing: border-box; }

  html, body{
    margin:0; padding:0; height:100%;
    font-family: 'EB Garamond', Georgia, serif;
    background: radial-gradient(ellipse at center, var(--wine) 0%, var(--wine-dark) 100%);
    overflow: hidden;
    color: var(--ink);
  }

  @font-face{
    font-family: 'Display';
    src: local('Playfair Display');
  }

  /* ambient floating petals */
  .petals{ position:fixed; inset:0; pointer-events:none; z-index:1; }
  .petal{
    position:absolute; top:-5%;
    font-size: 18px;
    opacity:.55;
    animation: fall linear infinite;
    color: var(--gold);
  }
  @keyframes fall{
    0%{ transform: translateY(-10vh) translateX(0) rotate(0deg); }
    100%{ transform: translateY(110vh) translateX(20px) rotate(200deg); }
  }

  .scene{
    position:relative; z-index:2;
    height:100vh; width:100vw;
    display:flex; align-items:center; justify-content:center;
    perspective: 2400px;
  }

  /* ---------- BOOK CONTAINER ---------- */
  .book-container {
    position: relative;
    width: min(78vw, 380px);
    aspect-ratio: 3/4.2;
    transform-style: preserve-3d;
    transform-origin: left center;
    transition: transform 1s cubic-bezier(.6,0,.2,1);
    z-index: 10;
  }
  /* Menggeser buku ke tengah layar saat terbuka */
  .book-container.open {
    transform: translateX(50%) scale(var(--open-scale));
  }

  /* ---------- COVER ---------- */
  .cover {
    position: absolute;
    inset: 0;
    transform-origin: left center;
    transform-style: preserve-3d;
    transition: transform 1s cubic-bezier(.6,0,.2,1);
    z-index: 50;
    cursor: pointer;
    /* Nilai Z diatur otomatis via JS */
    transform: translateZ(var(--z, 50px)) rotateY(0deg);
  }
  .cover.open {
    transform: translateZ(var(--z, 50px)) rotateY(-178deg);
    pointer-events: none;
  }

  /* Wajah depan dan belakang dari cover & halaman */
  .cover .front, .cover .back, .page .front, .page .back {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 6px;
  }
  .cover .front, .page .front { transform: rotateY(0deg); }
  .cover .back, .page .back { transform: rotateY(180deg); }

  .cover .front {
    background: radial-gradient(circle at 30% 20%, #7a2c3d 0%, var(--wine) 55%, var(--wine-dark) 100%);
    border: 1px solid rgba(201,162,75,.5);
    box-shadow: 0 30px 70px rgba(0,0,0,.55), inset 0 0 0 8px rgba(201,162,75,.12);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center;
    padding: 30px;
  }
  .cover .back {
    background: var(--wine-dark);
    border: 1px solid rgba(201,162,75,.2);
    box-shadow: inset 4px 0 20px rgba(0,0,0,0.6);
  }

  .cover .eyebrow{
    font-family: 'Display', 'Playfair Display', serif;
    letter-spacing: .35em;
    text-transform: uppercase;
    font-size: 11px;
    color: var(--gold);
    margin-bottom: 18px;
  }
  .cover h1{
    font-family: 'Display', 'Playfair Display', serif;
    font-size: clamp(28px, 6vw, 40px);
    color: var(--cream);
    margin: 0 0 10px;
    font-weight: 600;
  }
  .cover p.sub{
    font-family: 'Caveat', cursive;
    font-size: 22px;
    color: var(--blush);
    margin: 0 0 30px;
  }
  .seal{
    width:64px; height:64px; border-radius:50%;
    background: radial-gradient(circle at 35% 30%, #dab35e, var(--gold) 60%, #8a6b26 100%);
    display:flex; align-items:center; justify-content:center;
    font-size: 24px;
    box-shadow: 0 6px 18px rgba(0,0,0,.4);
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse{ 0%,100%{ transform:scale(1);} 50%{ transform:scale(1.06);} }
  .cover .hint{
    margin-top: 16px;
    font-size: 12px;
    letter-spacing: .12em;
    color: rgba(251,243,231,.6);
    text-transform: uppercase;
  }

  /* ---------- BOOK PAGES ---------- */
  .book{
    position: absolute;
    inset: 0;
    transform-style: preserve-3d;
  }

  .page {
    position: absolute;
    inset: 0;
    transform-origin: left center;
    transform-style: preserve-3d;
    transition: transform 1s cubic-bezier(.6,0,.2,1);
    transform: translateZ(var(--z, 0px)) rotateY(0deg);
  }
  .page.flipped {
    /* Menumpuk halaman dengan sudut yang sangat tipis agar terlihat alami */
    transform: translateZ(var(--z, 0px)) rotateY(-176deg);
  }

  .page .front {
    background: var(--cream);
    border: 1px solid rgba(92,31,46,.12);
    box-shadow: 2px 0 12px rgba(0,0,0,.15);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .page .back {
    background: var(--cream);
    background-image: linear-gradient(to right, rgba(0,0,0,0.04) 0%, transparent 8%);
    border: 1px solid rgba(92,31,46,.12);
    box-shadow: -2px 0 12px rgba(0,0,0,.1);
  }

  .page .photo-frame{
    position:relative;
    flex: 1 1 58%;
    margin: 20px 20px 0;
    border-radius: 3px;
    background: linear-gradient(135deg, #e9d6cf, #f3ded9);
    border: 6px solid #fff;
    box-shadow: 0 6px 16px rgba(0,0,0,.18);
    overflow:hidden;
    display:flex; align-items:center; justify-content:center;
  }
  .page .photo-frame img{
    width:100%; height:100%; object-fit:cover; display:block;
  }
  .page .photo-frame.missing img{ display:none; }
  .page .photo-frame.missing::after{
    content: '🤍  taruh foto di sini';
    font-family: 'Caveat', cursive;
    font-size: 18px;
    color: #a98a76;
  }

  .page .note{
    flex: 1 1 42%;
    padding: 14px 22px 10px;
    display:flex; flex-direction:column; justify-content:center;
    text-align:center;
  }
  .page .note .num{
    font-size: 11px; letter-spacing:.25em; text-transform:uppercase;
    color: var(--sage); margin-bottom:6px;
  }
  .page .note p{
    font-family: 'Caveat', cursive;
    font-size: clamp(17px, 3.4vw, 21px);
    line-height: 1.35;
    color: var(--ink);
    margin:0;
  }

  /* closing page styling */
  .page .front.closing{ align-items:center; justify-content:center; }
  .page .front.closing .note{ padding: 30px; }
  .page .front.closing p{ font-size: clamp(20px,4vw,26px); }
  .page .front.closing .big-heart{ font-size: 30px; margin-bottom: 8px; }

  /* ---------- CONTROLS ---------- */
  .controls{
    position:fixed; bottom: 26px; left:0; right:0;
    display:flex; justify-content:center; gap: 18px;
    z-index: 40;
    opacity:0; transition: opacity .6s ease;
  }
  .controls.show{ opacity:1; }
  .controls button{
    width:44px; height:44px; border-radius:50%;
    border:1px solid rgba(201,162,75,.5);
    background: rgba(255,255,255,.08);
    color: var(--gold);
    font-size: 18px;
    cursor:pointer;
    backdrop-filter: blur(4px);
    transition: transform .2s ease, background .2s ease;
  }
  .controls button:hover{ background: rgba(255,255,255,.18); transform: translateY(-2px); }
  .controls button:disabled{ opacity:.25; cursor:default; transform:none; }

  .progress{
    position:fixed; top: 20px; left:0; right:0;
    text-align:center; z-index:40;
    font-family: 'Display','Playfair Display',serif;
    font-size: 11px; letter-spacing:.3em; text-transform:uppercase;
    color: rgba(251,243,231,.55);
    opacity:0; transition: opacity .6s ease;
  }
  .progress.show{ opacity:1; }

  @media (prefers-reduced-motion: reduce){
    .cover, .petal{ animation:none !important; }
  }
</style>
</head>
<body>

<div class="petals" id="petals"></div>

<div class="progress" id="progress"></div>

<div class="scene">
  <div class="book-container" id="bookContainer">
    <div class="book" id="book"></div>

    <div class="cover" id="cover">
      <div class="front">
        <div class="eyebrow">Sebuah Buku Kecil</div>
        <h1 id="coverTitle">Untuk Sayangku</h1>
        <p class="sub">selamat ulang tahun, cinta 🤍</p>
        <div class="seal">💌</div>
        <div class="hint">ketuk untuk membuka</div>
      </div>
      <div class="back"></div>
    </div>
  </div>
</div>

<div class="controls" id="controls">
  <button id="prevBtn" aria-label="Halaman sebelumnya">‹</button>
  <button id="nextBtn" aria-label="Halaman berikutnya">›</button>
</div>

<script>
/* ======================================================================
   DATA HALAMAN BUKU — edit semua di bawah ini
   ====================================================================== */

// Judul di sampul buku (nama pacarmu)
const COVER_TITLE = "Untuk Sayangku";

// Tiap objek = satu halaman. "photo" = nama file di folder images/.
const PAGES = [
  {
    photo: "images/foto1.jpg",
    note: "Ini halaman pertama. Ceritain momen pertama kalian di sini~"
  },
  {
    photo: "images/foto2.jpg",
    note: "Halaman kedua. Bisa tentang momen lucu atau konyol berdua."
  },
  {
    photo: "images/foto3.jpg",
    note: "Halaman ketiga. Tulis hal yang paling kamu suka darinya."
  },
  {
    photo: "images/foto4.jpg",
    note: "Halaman keempat. Kenangan liburan atau jalan-jalan kalian."
  },
  {
    photo: "images/foto5.jpg",
    note: "Halaman kelima. Ucapan terima kasih sudah selalu ada."
  },
  {
    photo: "images/foto6.jpg",
    note: "Halaman keenam. Harapan kalian untuk tahun depan."
  }
];

// Pesan penutup di halaman terakhir
const CLOSING_MESSAGE = "Selamat ulang tahun, sayangku.\nSemoga tahun ini penuh hal-hal baik untukmu.\nAku sayang kamu, selalu.";

/* ====================================================================== */

document.getElementById('coverTitle').textContent = COVER_TITLE;

const bookEl = document.getElementById('book');
const cover = document.getElementById('cover');
const bookContainer = document.getElementById('bookContainer');
const totalPages = PAGES.length + 1; // +1 for closing page

// Setup urutan Z-Index 3D agar penumpukan tepat tanpa tabrakan Z (Z-fighting)
cover.style.setProperty('--z', `${totalPages + 2}px`);

PAGES.forEach((p, i) => {
  const pageEl = document.createElement('div');
  pageEl.className = 'page';
  pageEl.style.setProperty('--z', `${totalPages - i}px`);
  pageEl.innerHTML = `
    <div class="front">
      <div class="photo-frame">
        <img src="${p.photo}" alt="Kenangan ${i+1}"
             onerror="this.onerror=null;this.parentElement.classList.add('missing')">
      </div>
      <div class="note">
        <div class="num">${String(i+1).padStart(2,'0')} / ${String(PAGES.length).padStart(2,'0')}</div>
        <p>${p.note}</p>
      </div>
    </div>
    <div class="back"></div>
  `;
  bookEl.appendChild(pageEl);
});

// closing page
const closingEl = document.createElement('div');
closingEl.className = 'page closing-page';
closingEl.style.setProperty('--z', `0px`);
closingEl.innerHTML = `
  <div class="front closing">
    <div class="note">
      <div class="big-heart">🤍</div>
      <p>${CLOSING_MESSAGE.replace(/\n/g,'<br>')}</p>
    </div>
  </div>
  <div class="back"></div>
`;
bookEl.appendChild(closingEl);

const pages = Array.from(bookEl.querySelectorAll('.page'));
let current = 0; // number of pages currently flipped

const controls = document.getElementById('controls');
const progress = document.getElementById('progress');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');

function updateUI(){
  prevBtn.disabled = current === 0;
  // Nonaktifkan 'next' jika kita sudah di halaman penutup
  nextBtn.disabled = current === pages.length - 1;
  
  progress.textContent = current === 0
    ? 'sampul'
    : (current === pages.length - 1 ? 'selesai' : `halaman ${current} / ${pages.length - 1}`);
}

function openBook(){
  bookContainer.classList.add('open');
  cover.classList.add('open');
  controls.classList.add('show');
  progress.classList.add('show');
  updateUI();
}

function next(){
  if(current >= pages.length - 1) return;
  pages[current].classList.add('flipped');
  current++;
  updateUI();
}

function prev(){
  if(current <= 0) return;
  current--;
  pages[current].classList.remove('flipped');
  updateUI();
}

cover.addEventListener('click', openBook);
nextBtn.addEventListener('click', next);
prevBtn.addEventListener('click', prev);

// swipe support
let touchX = null;
document.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  if(touchX === null) return;
  const dx = e.changedTouches[0].clientX - touchX;
  if(Math.abs(dx) > 50){ dx < 0 ? next() : prev(); }
  touchX = null;
});

// keyboard support
document.addEventListener('keydown', e => {
  if(e.key === 'ArrowRight') next();
  if(e.key === 'ArrowLeft') prev();
});

// ambient petals
const petalContainer = document.getElementById('petals');
const petalChars = ['🤍','✦','🕊'];
for(let i=0; i<14; i++){
  const el = document.createElement('div');
  el.className = 'petal';
  el.textContent = petalChars[i % petalChars.length];
  el.style.left = Math.random()*100 + 'vw';
  el.style.animationDuration = (14 + Math.random()*10) + 's';
  el.style.animationDelay = (Math.random()*14) + 's';
  el.style.fontSize = (12 + Math.random()*10) + 'px';
  petalContainer.appendChild(el);
}
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Caveat:wght@500;600&family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet">
</body>
</html>
