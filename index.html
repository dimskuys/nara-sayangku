<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Sayangku 🤍</title>

<style>
  :root {
    --wine: #5c1f2e;
    --wine-dark: #3d1420;
    --gold: #c9a24b;
    --cream: #fbf3e7;
    --ink: #3a2b28;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: 'EB Garamond', Georgia, serif;
    background: radial-gradient(ellipse at center, var(--wine) 0%, var(--wine-dark) 100%);
    overflow: hidden;
    color: var(--ink);
  }

  .scene { height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center; perspective: 2400px; }
  
  /* Container Buku */
  .book-container {
    position: relative;
    width: min(85vw, 400px);
    aspect-ratio: 3/4;
    transform-style: preserve-3d;
    transform-origin: left center;
    transition: transform 1s cubic-bezier(.6,0,.2,1);
  }
  .book-container.open { transform: translateX(50%) scale(1); }

  /* Halaman */
  .cover, .page { position: absolute; inset: 0; transform-origin: left center; transform-style: preserve-3d; transition: transform 1s cubic-bezier(.6,0,.2,1); }
  
  .front, .back { 
    position: absolute; inset: 0; backface-visibility: hidden; border-radius: 6px;
    background: var(--cream); border: 1px solid rgba(92,31,46,.12);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .back { transform: rotateY(180deg); }

  /* BINGKAI OTOMATIS */
  .photo-container {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 30px; width: 100%;
  }
  .auto-frame {
    display: inline-block;
    padding: 12px;
    background: #fff;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    line-height: 0;
  }
  .auto-frame img {
    max-width: 100%;
    max-height: 40vh;
    height: auto;
    width: auto;
  }

  .note { padding: 20px; text-align: center; font-family: 'Caveat', cursive; font-size: 22px; }
  
  /* Animasi */
  .cover.open { transform: rotateY(-180deg); }
  .page.flipped { transform: rotateY(-180deg); }
</style>
</head>
<body>

<audio id="bgMusic" loop><source src="lagu.mp3" type="audio/mpeg"></audio>

<div class="scene">
  <div class="book-container" id="bookContainer">
    
    <!-- Cover -->
    <div class="cover" id="cover">
      <div class="front" style="background: var(--wine); color: white;">
        <h1>Untuk Sayangku</h1>
        <p>Ketuk untuk membuka</p>
      </div>
      <div class="back" id="p1"></div>
    </div>

    <!-- Halaman Dalam -->
    <div class="book" id="book">
      <div class="page" id="p2">
        <div class="front" id="p3"></div>
        <div class="back" id="p4"></div>
      </div>
    </div>

  </div>
</div>

<script>
// DATA FOTO (Ubah nama file di sini)
const content = [
  { img: "images/foto1.jpg", note: "Momen indah pertama kita." },
  { img: "images/foto2.jpg", note: "Selalu senang saat berdua." },
  { img: "images/foto3.jpg", note: "Terima kasih untuk segalanya." }
];

function buildPage(data) {
  return `
    <div class="photo-container">
      <div class="auto-frame">
        <img src="${data.img}" onerror="this.style.display='none'">
      </div>
    </div>
    <div class="note">${data.note}</div>
  `;
}

// Pasang ke elemen
document.getElementById('p1').innerHTML = buildPage(content[0]);
document.getElementById('p3').innerHTML = buildPage(content[1]);
document.getElementById('p4').innerHTML = buildPage(content[2]);

// Interaksi
const cover = document.getElementById('cover');
const page = document.querySelector('.page');
const bookContainer = document.getElementById('bookContainer');

cover.onclick = () => {
    bookContainer.classList.add('open');
    cover.classList.add('open');
    document.getElementById('bgMusic').play();
};

page.onclick = () => page.classList.toggle('flipped');
</script>
</body>
</html>
